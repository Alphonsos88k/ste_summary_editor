<div class="se-br-entry" data-num="{{num}}">
    <div class="se-br-entry-header">
        <span class="se-br-num">#{{num}}</span>
        <span class="se-br-badge {{badgeCls}}">{{badgeTxt}}</span>
        <span class="se-br-status" id="se-br-status-{{num}}"></span>
    </div>
    <div class="se-br-original" id="se-br-original-{{num}}">{{preview}}</div>
</div>
