<div class="se-fr-header">
    <span class="se-fr-title">{{title}}</span>
    <button class="se-close-circle se-cd-dismiss" title="Close">&times;</button>
</div>
<div class="se-fr-body">
    <p class="se-cd-msg">{{label}}</p>
    <input class="se-fr-input se-cd-input" type="text" value="{{defaultValue}}" />
    <div class="se-cd-actions">
        <button class="se-btn se-btn-sm se-cd-cancel">Cancel</button>
        <button class="se-btn se-btn-primary se-btn-sm se-cd-ok">OK</button>
    </div>
</div>
