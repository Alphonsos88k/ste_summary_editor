<div class="se-float-panel se-frm-panel" id="se-frm-panel">
    <div class="se-float-panel-header se-frm-header">
        <span class="se-float-panel-title">&#128194; Output Planner</span>
        <button class="se-close-circle se-frm-close" title="Close">&times;</button>
    </div>
    <div class="se-frm-body">
        <div class="se-frm-table-wrap">
            <table class="se-frm-table">
                <thead>
                    <tr>
                        <th class="se-frm-th-color"></th>
                        <th class="se-frm-th-label">Label</th>
                        <th class="se-frm-th-count" title="Entry count">#</th>
                        <th class="se-frm-th-size">Est. Size</th>
                        <th class="se-frm-th-actions"></th>
                    </tr>
                </thead>
                <tbody id="se-frm-rows"></tbody>
            </table>
        </div>
        <div class="se-frm-summary" id="se-frm-summary"></div>
        <div class="se-frm-footer">
            <div class="se-frm-footer-left">
                <button class="se-btn se-btn-sm se-frm-balance" id="se-frm-auto-balance" title="Redistribute entries evenly across all ranges">&#9878; Auto-balance</button>
                <button class="se-btn se-btn-sm" id="se-frm-new-file" title="Add a new empty output file">&#43; New File</button>
            </div>
            <button class="se-btn se-btn-sm se-frm-close-btn se-frm-close">Close</button>
        </div>
    </div>
</div>
